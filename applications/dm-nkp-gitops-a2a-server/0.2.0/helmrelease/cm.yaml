apiVersion: v1
kind: ConfigMap
metadata:
  name: dm-nkp-gitops-a2a-server-values
  namespace: ${releaseNamespace}
data:
  values.yaml: |
    # =============================================================================
    # DEPLOYMENT MODE
    # =============================================================================
    # Choose deployment mode:
    # - "deployment": Traditional Kubernetes Deployment (works everywhere)
    deploymentMode: "deployment"
    
    # Replicas (set to 2+ for HA in production)
    replicaCount: 2
    
    # =============================================================================
    # A2A SERVER CONFIGURATION
    # =============================================================================
    a2a:
      port: 8080
      # CRITICAL: Always enable read-only mode in production
      readOnly: true
      logLevel: "info"
    
    # =============================================================================
    # TLS CONFIGURATION
    # =============================================================================
    tls:
      enabled: true
      # Use the letsencrypt-clusterissuer from the catalog
      clusterIssuer: "letsencrypt-prod"
      # Set to true only if letsencrypt-clusterissuer is not installed
      selfSigned: false
    
    # =============================================================================
    # GATEWAY API / INGRESS
    # =============================================================================
    httpRoute:
      enabled: true
      # CHANGE THIS to your actual hostname
      hostname: "gitops-agent.example.com"
      parentRefs:
        - name: traefik-gateway
          namespace: traefik-system
    
    # =============================================================================
    # RESOURCES
    # =============================================================================
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    
    # =============================================================================
    # NETWORK POLICY (Zero Trust)
    # =============================================================================
    networkPolicy:
      enabled: true
      ingressFrom:
        - namespaceSelector:
            matchLabels:
              purpose: ai-agents
        - namespaceSelector:
            matchLabels:
              name: kommander
