# RBAC for post-install Job: patch goldilocks-ui ConfigMap; read dashboard Service in goldilocks ns.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${releaseName}-postinstall
  namespace: ${workspaceNamespace}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${releaseName}-postinstall
  namespace: ${workspaceNamespace}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch"]
    resourceNames: ["goldilocks-ui"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${releaseName}-postinstall
  namespace: ${workspaceNamespace}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${releaseName}-postinstall
subjects:
  - kind: ServiceAccount
    name: ${releaseName}-postinstall
    namespace: ${workspaceNamespace}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${releaseName}-postinstall-app-svc
  namespace: goldilocks
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${releaseName}-postinstall-app-svc
  namespace: goldilocks
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${releaseName}-postinstall-app-svc
subjects:
  - kind: ServiceAccount
    name: ${releaseName}-postinstall
    namespace: ${workspaceNamespace}
---