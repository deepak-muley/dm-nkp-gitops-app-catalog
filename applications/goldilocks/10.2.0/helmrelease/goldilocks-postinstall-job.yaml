# Post-install Job: discovers goldilocks-dashboard LoadBalancer in goldilocks namespace
# and patches goldilocks-ui ConfigMap with dashboardLink (NKP Launch), same pattern as kagent.
apiVersion: batch/v1
kind: Job
metadata:
  name: ${releaseName}-postinstall
  namespace: ${workspaceNamespace}
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: ${releaseName}-postinstall
      restartPolicy: OnFailure
      containers:
        - name: patch-dashboard-link
          image: mesosphere/kubectl:v1.34.1-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: WORKSPACE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: APP_NAMESPACE
              value: "goldilocks"
            - name: APP_SERVICE
              value: "goldilocks-dashboard"
            - name: APP_PORT
              value: "80"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting post-install (ns=$WORKSPACE_NAMESPACE, app=$APP_SERVICE in $APP_NAMESPACE)"
              sleep 15
              echo "Waiting for goldilocks-ui ConfigMap..."
              for i in $(seq 1 60); do
                if kubectl get configmap goldilocks-ui -n "$WORKSPACE_NAMESPACE" 2>/dev/null; then
                  echo "ConfigMap goldilocks-ui found."
                  break
                fi
                echo "Waiting for ConfigMap... ($i/60)"; sleep 5
              done
              if ! kubectl get configmap goldilocks-ui -n "$WORKSPACE_NAMESPACE" 2>/dev/null; then
                echo "ERROR: goldilocks-ui ConfigMap not found after 5min"; exit 1
              fi

              echo "Waiting for $APP_SERVICE LoadBalancer in $APP_NAMESPACE..."
              IP=""; HOSTNAME=""
              for i in $(seq 1 60); do
                IP=$(kubectl get svc -n "$APP_NAMESPACE" "$APP_SERVICE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
                HOSTNAME=$(kubectl get svc -n "$APP_NAMESPACE" "$APP_SERVICE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
                if [ -n "$IP" ] || [ -n "$HOSTNAME" ]; then
                  break
                fi
                echo "Waiting... ($i/60)"; sleep 5
              done

              if [ -z "$IP" ] && [ -z "$HOSTNAME" ]; then
                echo "ERROR: $APP_SERVICE LoadBalancer not found"; kubectl get svc -n "$APP_NAMESPACE" "$APP_SERVICE" -o yaml 2>/dev/null || true; exit 1
              fi

              if [ -n "$IP" ]; then
                ENDPOINT="http://$IP:$APP_PORT/"
              else
                ENDPOINT="http://$HOSTNAME:$APP_PORT/"
              fi

              PAYLOAD=$(printf '{"data": {"dashboardLink": "%s"}}' "$ENDPOINT")
              kubectl patch configmap goldilocks-ui -n "$WORKSPACE_NAMESPACE" --type=merge -p "$PAYLOAD"
              echo "Dashboard link updated: $ENDPOINT"
---